<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura organizada do Sistema de Gerenciamento de TCC</title>
  <desc id="desc">Diagrama organizado em colunas: cliente, frontend React Vite, seguranca JWT, backend Spring Boot, dados PostgreSQL e validacao por testes.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2937"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 42px; font-weight: 700; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 19px; fill: #475569; letter-spacing: 0; }
      .group-title { font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; fill: #0f172a; letter-spacing: 0; }
      .box-title { font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; fill: #0f172a; letter-spacing: 0; }
      .box-sub { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #475569; letter-spacing: 0; }
      .note { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #475569; letter-spacing: 0; }
      .group { fill: #ffffff; stroke-width: 2; rx: 16; }
      .client-stroke { stroke: #0284c7; }
      .front-stroke { stroke: #16a34a; }
      .security-stroke { stroke: #dc2626; }
      .back-stroke { stroke: #7c3aed; }
      .data-stroke { stroke: #d97706; }
      .quality-stroke { stroke: #64748b; }
      .client-fill { fill: #e0f2fe; }
      .front-fill { fill: #dcfce7; }
      .security-fill { fill: #fee2e2; }
      .back-fill { fill: #ede9fe; }
      .data-fill { fill: #fef3c7; }
      .quality-fill { fill: #e2e8f0; }
      .box { stroke-width: 2; rx: 12; }
      .line { stroke: #1f2937; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #64748b; stroke-width: 2.4; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrowSoft); }
      .step { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #ffffff; }
      .step-dot { fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>
  <text class="title" x="960" y="64" text-anchor="middle">Arquitetura do Sistema de Gerenciamento de TCC</text>
  <text class="subtitle" x="960" y="100" text-anchor="middle">Fluxo principal organizado: Usuario -> React/Vite -> JWT -> API Spring Boot -> JPA -> PostgreSQL</text>

  <rect class="group client-stroke client-fill" x="70" y="165" width="260" height="585" opacity="0.72"/>
  <text class="group-title" x="200" y="202" text-anchor="middle">1. Cliente</text>

  <rect class="group front-stroke front-fill" x="385" y="165" width="305" height="585" opacity="0.72"/>
  <text class="group-title" x="538" y="202" text-anchor="middle">2. Frontend React/Vite</text>

  <rect class="group security-stroke security-fill" x="745" y="165" width="280" height="585" opacity="0.72"/>
  <text class="group-title" x="885" y="202" text-anchor="middle">3. Seguranca</text>

  <rect class="group back-stroke back-fill" x="1080" y="165" width="310" height="585" opacity="0.72"/>
  <text class="group-title" x="1235" y="202" text-anchor="middle">4. Backend Spring Boot</text>

  <rect class="group data-stroke data-fill" x="1445" y="165" width="330" height="585" opacity="0.72"/>
  <text class="group-title" x="1610" y="202" text-anchor="middle">5. Dados</text>

  <rect class="group quality-stroke quality-fill" x="385" y="815" width="1000" height="150" opacity="0.78"/>
  <text class="group-title" x="885" y="850" text-anchor="middle">Validacao e documentacao</text>

  <rect class="box client-stroke client-fill" x="110" y="275" width="180" height="82"/>
  <text class="box-title" x="200" y="310" text-anchor="middle">Usuario</text>
  <text class="box-sub" x="200" y="335" text-anchor="middle">Aluno / orientador</text>

  <rect class="box client-stroke client-fill" x="110" y="555" width="180" height="82"/>
  <text class="box-title" x="200" y="590" text-anchor="middle">Navegador</text>
  <text class="box-sub" x="200" y="615" text-anchor="middle">Aplicacao web</text>

  <rect class="box front-stroke front-fill" x="425" y="245" width="225" height="78"/>
  <text class="box-title" x="538" y="279" text-anchor="middle">Rotas</text>
  <text class="box-sub" x="538" y="304" text-anchor="middle">Publicas + /app</text>

  <rect class="box front-stroke front-fill" x="425" y="410" width="225" height="78"/>
  <text class="box-title" x="538" y="444" text-anchor="middle">AuthProvider</text>
  <text class="box-sub" x="538" y="469" text-anchor="middle">ProtectedRoute</text>

  <rect class="box front-stroke front-fill" x="425" y="575" width="225" height="78"/>
  <text class="box-title" x="538" y="609" text-anchor="middle">Services HTTP</text>
  <text class="box-sub" x="538" y="634" text-anchor="middle">VITE_API_URL</text>

  <rect class="box security-stroke security-fill" x="785" y="245" width="200" height="78"/>
  <text class="box-title" x="885" y="279" text-anchor="middle">Bearer Token</text>
  <text class="box-sub" x="885" y="304" text-anchor="middle">Authorization</text>

  <rect class="box security-stroke security-fill" x="785" y="410" width="200" height="78"/>
  <text class="box-title" x="885" y="444" text-anchor="middle">JWT Filter</text>
  <text class="box-sub" x="885" y="469" text-anchor="middle">Valida token</text>

  <rect class="box security-stroke security-fill" x="785" y="575" width="200" height="78"/>
  <text class="box-title" x="885" y="609" text-anchor="middle">Spring Security</text>
  <text class="box-sub" x="885" y="634" text-anchor="middle">Stateless</text>

  <rect class="box back-stroke back-fill" x="1120" y="245" width="230" height="78"/>
  <text class="box-title" x="1235" y="279" text-anchor="middle">Controllers REST</text>
  <text class="box-sub" x="1235" y="304" text-anchor="middle">Rotas /api</text>

  <rect class="box back-stroke back-fill" x="1120" y="410" width="230" height="78"/>
  <text class="box-title" x="1235" y="444" text-anchor="middle">Services</text>
  <text class="box-sub" x="1235" y="469" text-anchor="middle">Regras de negocio</text>

  <rect class="box back-stroke back-fill" x="1120" y="575" width="230" height="78"/>
  <text class="box-title" x="1235" y="609" text-anchor="middle">Repositories</text>
  <text class="box-sub" x="1235" y="634" text-anchor="middle">Spring Data JPA</text>

  <rect class="box data-stroke data-fill" x="1490" y="245" width="240" height="78"/>
  <text class="box-title" x="1610" y="279" text-anchor="middle">Entidades JPA</text>
  <text class="box-sub" x="1610" y="304" text-anchor="middle">Dominio do TCC</text>

  <rect class="box data-stroke data-fill" x="1490" y="410" width="240" height="78"/>
  <text class="box-title" x="1610" y="444" text-anchor="middle">PostgreSQL</text>
  <text class="box-sub" x="1610" y="469" text-anchor="middle">Banco principal</text>

  <rect class="box data-stroke data-fill" x="1490" y="575" width="240" height="78"/>
  <text class="box-title" x="1610" y="609" text-anchor="middle">H2</text>
  <text class="box-sub" x="1610" y="634" text-anchor="middle">Perfil E2E</text>

  <rect class="box quality-stroke quality-fill" x="435" y="875" width="250" height="58"/>
  <text class="box-title" x="560" y="900" text-anchor="middle">Playwright E2E</text>
  <text class="box-sub" x="560" y="922" text-anchor="middle">Fluxos da interface</text>

  <rect class="box quality-stroke quality-fill" x="760" y="875" width="250" height="58"/>
  <text class="box-title" x="885" y="900" text-anchor="middle">Testes Backend</text>
  <text class="box-sub" x="885" y="922" text-anchor="middle">Services/controllers</text>

  <rect class="box quality-stroke quality-fill" x="1085" y="875" width="250" height="58"/>
  <text class="box-title" x="1210" y="900" text-anchor="middle">OpenAPI</text>
  <text class="box-sub" x="1210" y="922" text-anchor="middle">Documentacao opcional</text>

  <circle class="step-dot" cx="200" cy="390" r="15"/><text class="step" x="200" y="395" text-anchor="middle">1</text>
  <circle class="step-dot" cx="360" cy="596" r="15"/><text class="step" x="360" y="601" text-anchor="middle">2</text>
  <circle class="step-dot" cx="717" cy="614" r="15"/><text class="step" x="717" y="619" text-anchor="middle">3</text>
  <circle class="step-dot" cx="1053" cy="614" r="15"/><text class="step" x="1053" y="619" text-anchor="middle">4</text>
  <circle class="step-dot" cx="1418" cy="614" r="15"/><text class="step" x="1418" y="619" text-anchor="middle">5</text>

  <path class="line" d="M200 357 L200 555"/>
  <path class="line" d="M290 596 L425 614"/>
  <path class="line" d="M538 323 L538 410"/>
  <path class="line" d="M538 488 L538 575"/>
  <path class="line" d="M650 614 L785 284"/>
  <path class="line" d="M885 323 L885 410"/>
  <path class="line" d="M885 488 L885 575"/>
  <path class="line" d="M985 614 L1120 284"/>
  <path class="line" d="M1235 323 L1235 410"/>
  <path class="line" d="M1235 488 L1235 575"/>
  <path class="line" d="M1350 614 L1490 284"/>
  <path class="line" d="M1610 323 L1610 410"/>
  <path class="soft-line" d="M1610 488 L1610 575"/>

  <path class="soft-line" d="M560 875 C560 780, 538 735, 538 653"/>
  <path class="soft-line" d="M885 875 C885 760, 1235 735, 1235 653"/>
  <path class="soft-line" d="M1210 875 C1210 760, 1235 700, 1235 323"/>

  <text class="note" x="960" y="1005" text-anchor="middle">Setas solidas mostram o fluxo principal. Setas pontilhadas mostram validacao, documentacao e banco de testes.</text>
</svg>
